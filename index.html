    <style>
        body {
            background: #060a13;
        }

        .wheel-container {
            position: relative;
            height: 240px;
            overflow: hidden;
            border-radius: 16px;
            background: #0d1117;
            border: 1px solid rgba(0, 255, 136, 0.15);
            box-shadow: 0 0 30px rgba(0, 255, 136, 0.05), inset 0 0 30px rgba(0, 0, 0, 0.3);
        }

        .wheel-strip {
            position: absolute;
            width: 100%;
            top: 0;
            left: 0;
            will-change: transform;
        }

        .wheel-item {
            height: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            font-size: 0.9rem;
            color: #c9d1d9;
            border-bottom: 1px solid rgba(255, 255, 255, 0.03);
            padding: 0 16px;
            text-align: center;
            flex-direction: column;
            gap: 2px;
        }

        .wheel-item .sub {
            font-size: 0.7rem;
            color: #8b949e;
            font-weight: 400;
        }

        .wheel-selector {
            position: absolute;
            top: 80px;
            left: 0;
            right: 0;
            height: 80px;
            border-top: 2px solid #00ff88;
            border-bottom: 2px solid #00ff88;
            background: rgba(0, 255, 136, 0.04);
            pointer-events: none;
            z-index: 10;
            box-shadow: 0 0 20px rgba(0, 255, 136, 0.1);
        }

        .wheel-container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 80px;
            background: linear-gradient(to bottom, #0d1117, transparent);
            z-index: 5;
            pointer-events: none;
        }

        .wheel-container::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 80px;
            background: linear-gradient(to top, #0d1117, transparent);
            z-index: 5;
            pointer-events: none;
        }

        .wheel-item-selected {
            color: #00ff88 !important;
            text-shadow: 0 0 10px rgba(0, 255, 136, 0.5);
        }

        @keyframes pulse-glow {

            0%,
            100% {
                box-shadow: 0 0 20px rgba(0, 255, 136, 0.2);
            }

            50% {
                box-shadow: 0 0 40px rgba(0, 255, 136, 0.5);
            }
        }

        #spinBtn:not(:disabled):not(.spinning) {
            animation: pulse-glow 2s infinite;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(-20px)
            }

            to {
                opacity: 1;
                transform: translateX(0)
            }
        }

        .history-entry {
            animation: slideIn 0.3s ease-out;
        }

        @keyframes popIn {
            0% {
                opacity: 0;
                transform: scale(0.8)
            }

            100% {
                opacity: 1;
                transform: scale(1)
            }
        }

        .result-pop {
            animation: popIn 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .pos-tab {
            transition: all 0.2s;
        }

        .pos-tab.active {
            background: #00ff88 !important;
            color: #060a13 !important;
            box-shadow: 0 0 20px rgba(0, 255, 136, 0.3);
        }

        .manager-card {
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .manager-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.4);
        }

        .modal-overlay {
            transition: opacity 0.3s;
        }

        .modal-content {
            transition: transform 0.3s, opacity 0.3s;
        }

        input[type=number]::-webkit-inner-spin-button {
            opacity: 1;
        }

        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: #0d1117;
        }

        ::-webkit-scrollbar-thumb {
            background: #30363d;
            border-radius: 3px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #484f58;
        }
    </style>
</head>

        const STARTING_POSITIONS = ["GK", "LB", "CB1", "CB2", "RB", "CM1", "CM2", "CM3", "LW", "ST", "RW"];
        const SUB_POSITIONS = ["SUB1", "SUB2", "SUB3", "SUB4", "SUB5"];
        const FORMATION = { GK: 1, LB: 1, CB1: 1, CB2: 1, RB: 1, CM1: 1, CM2: 1, CM3: 1, LW: 1, ST: 1, RW: 1, SUB1: 1, SUB2: 1, SUB3: 1, SUB4: 1, SUB5: 1 };
        const POS_LABELS = { GK: "GK", LB: "LB", CB1: "CB 1", CB2: "CB 2", RB: "RB", CM1: "CM 1", CM2: "CM 2", CM3: "CM 3", LW: "LW", ST: "ST", RW: "RW", SUB1: "Sub LB", SUB2: "Sub CB", SUB3: "Sub RB", SUB4: "Sub CM", SUB5: "Sub ATT" };
        const TOTAL_PER_MANAGER = 16;
        const TOTAL_PICKS = managers.length * TOTAL_PER_MANAGER; // 64
        const ITEM_H = 80;
        let state = null;
        let isSpinning = false;
        let modalPos = "GK";
        let tempRoster = null;

        function freshState() {
            return {
                roster: JSON.parse(JSON.stringify(fc26Roster)),
                history: [],
                teams: Object.fromEntries(managers.map(m => [m, Object.fromEntries(POSITIONS.map(p => [p, []]))]))
            };
        }

        function saveState() { localStorage.setItem('fc26draft', JSON.stringify(state)); }
        function loadState() {
            try {
                const d = JSON.parse(localStorage.getItem('fc26draft'));
                if (d && d.roster && d.teams && d.history) {
                    // Validate teams have arrays (migration from old format)
                    for (const m of managers) {
                        if (!d.teams[m]) return null;
                        for (const p of POSITIONS) {
                            if (!Array.isArray(d.teams[m][p])) return null;
                        }
                    }
                    return d;
                }
            } catch (e) { }
            return null;
        }

        /* ====== HELPERS ====== */
        function getAvailableManagers(pos) {
            return managers.filter(m => (state.teams[m][pos] || []).length < FORMATION[pos]);
        }

        function getManagerSquadCount(m) {
            return POSITIONS.reduce((sum, p) => sum + (state.teams[m][p] || []).length, 0);
        }

        /* ====== INIT ====== */
        function init() {
            const saved = loadState();
            state = saved || freshState();
            renderAll();
        }

        function renderAll() {
            renderProgress();
            renderWheelsIdle();
            renderTeamCards();
            renderHistory();
            updateStatus();
        }

        /* ====== POSITION SELECT ====== */
        let currentPos = "GK";
        function selectPosition(pos) {
            currentPos = pos;
            document.querySelectorAll('.pos-tab').forEach(t => { t.classList.toggle('active', t.dataset.pos === pos); });
            renderWheelsIdle();
            updateStatus();
        }

        function updateStatus() {
            const players = state.roster[currentPos] || [];
            const mgrs = getAvailableManagers(currentPos);
            const el = document.getElementById('statusMsg');
            const posLimit = FORMATION[currentPos];
            if (players.length === 0 || mgrs.length === 0) {
                el.textContent = `✅ All ${currentPos} slots filled! (${posLimit} per manager)`;
                el.className = 'text-center text-neon text-sm mb-4 font-semibold';
                document.getElementById('spinBtn').disabled = true;
            } else {
                el.textContent = `${players.length} player(s) · ${mgrs.length} manager(s) need ${currentPos} (${posLimit} per squad)`;
                el.className = 'text-center text-gray-400 text-sm mb-4';
                document.getElementById('spinBtn').disabled = false;
            }
            if (isSpinning) document.getElementById('spinBtn').disabled = true;
        }

        /* ====== PROGRESS ====== */
        function renderProgress() {
            const done = state.history.length;
            document.getElementById('progressText').textContent = `${done} / ${TOTAL_PICKS}`;
            document.getElementById('progressBar').style.width = `${(done / TOTAL_PICKS) * 100}%`;
        }

        /* ====== WHEELS IDLE ====== */
        function renderWheelsIdle() {
            const players = state.roster[currentPos] || [];
            const mgrs = getAvailableManagers(currentPos);
            fillWheelIdle('playerStrip', players.map(p => `<span>${p.name}</span><span class="sub">${p.rating} · ${p.club}</span>`));
            fillWheelIdle('managerStrip', mgrs.map(m => `<span class="text-lg">${m}</span>`));
        }

        function fillWheelIdle(stripId, htmlArr) {
            const strip = document.getElementById(stripId);
            if (htmlArr.length === 0) { strip.innerHTML = '<div class="wheel-item text-gray-600">—</div>'.repeat(3); strip.style.transition = 'none'; strip.style.transform = 'translateY(0)'; return; }
            let items = []; for (let i = 0; i < 3; i++) items.push(...htmlArr);
            strip.innerHTML = items.map(h => `<div class="wheel-item">${h}</div>`).join('');
            strip.style.transition = 'none';
            const center = htmlArr.length;
            strip.style.transform = `translateY(${-(center - 1) * ITEM_H}px)`;
        }

        /* ====== SPIN ====== */
        async function handleSpin() {
            const players = state.roster[currentPos] || [];
            const mgrs = getAvailableManagers(currentPos);
            if (players.length === 0 || mgrs.length === 0 || isSpinning) return;
            isSpinning = true;
            const btn = document.getElementById('spinBtn');
            btn.disabled = true;
            btn.classList.add('spinning');
            btn.textContent = '🎰 SPINNING...';
            document.getElementById('resultBox').classList.add('hidden');

            const pIdx = Math.floor(Math.random() * players.length);
            const mIdx = Math.floor(Math.random() * mgrs.length);

            await Promise.all([
                spinWheel('playerStrip', players.map(p => `<span>${p.name}</span><span class="sub">${p.rating} · ${p.club}</span>`), pIdx, 3500),
                spinWheel('managerStrip', mgrs.map(m => `<span class="text-lg">${m}</span>`), mIdx, 4200)
            ]);

            const player = players[pIdx];
            const manager = mgrs[mIdx];

            // update state: remove player from pool, add to manager's team
            state.roster[currentPos] = state.roster[currentPos].filter((_, i) => i !== pIdx);
            state.teams[manager][currentPos].push(player);
            state.history.push({ manager, player: player.name, rating: player.rating, club: player.club, position: currentPos });
            saveState();

            // show result
            const slotsFilled = state.teams[manager][currentPos].length;
            const slotsMax = FORMATION[currentPos];
            showResult(manager, player, slotsFilled, slotsMax);
            renderAll();

            isSpinning = false;
            btn.classList.remove('spinning');
            btn.textContent = '🎰 SPIN';
            updateStatus();
        }

        function spinWheel(stripId, htmlArr, winnerIdx, duration) {
            return new Promise(resolve => {
                const strip = document.getElementById(stripId);
                const CYCLES = 7;
                let all = [];
                for (let i = 0; i < CYCLES; i++) all.push(...htmlArr);
                for (let i = 0; i <= winnerIdx; i++) all.push(htmlArr[i]);
                strip.innerHTML = all.map(h => `<div class="wheel-item">${h}</div>`).join('');
                strip.style.transition = 'none';
                strip.style.transform = 'translateY(0px)';
                strip.offsetHeight;
                const target = CYCLES * htmlArr.length + winnerIdx;
                const targetY = -(target - 1) * ITEM_H;
                strip.style.transition = `transform ${duration}ms cubic-bezier(0.12, 0.8, 0.15, 1)`;
                strip.style.transform = `translateY(${targetY}px)`;

                // tick sounds
                let lastIdx = -1;
                const audioCtx = window.__audioCtx;
                const start = performance.now();
                function tick() {
                    if (!audioCtx) { if (performance.now() - start < duration) requestAnimationFrame(tick); return; }
                    try {
                        const m = new DOMMatrix(getComputedStyle(strip).transform);
                        const curIdx = Math.floor(Math.abs(m.m42) / ITEM_H);
                        if (curIdx !== lastIdx) {
                            lastIdx = curIdx;
                            const o = audioCtx.createOscillator();
                            const g = audioCtx.createGain();
                            o.connect(g); g.connect(audioCtx.destination);
                            o.frequency.value = 600 + Math.random() * 300;
                            g.gain.setValueAtTime(0.04, audioCtx.currentTime);
                            g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.03);
                            o.start(); o.stop(audioCtx.currentTime + 0.03);
                        }
                    } catch (e) { }
                    if (performance.now() - start < duration) requestAnimationFrame(tick);
                }
                requestAnimationFrame(tick);

                strip.addEventListener('transitionend', () => {
                    const items = strip.querySelectorAll('.wheel-item');
                    if (items[target]) items[target].classList.add('wheel-item-selected');
                    if (audioCtx) try {
                        const o = audioCtx.createOscillator(), g = audioCtx.createGain();
                        o.connect(g); g.connect(audioCtx.destination);
                        o.frequency.value = 523; g.gain.setValueAtTime(0.12, audioCtx.currentTime);
                        g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.25);
                        o.start(); o.stop(audioCtx.currentTime + 0.25);
                    } catch (e) { }
                    resolve();
                }, { once: true });
            });
        }

        document.addEventListener('click', () => {
            if (!window.__audioCtx) try { window.__audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch (e) { }
        }, { once: true });

        /* ====== RESULT ====== */
        function showResult(manager, player, slotsFilled, slotsMax) {
            const box = document.getElementById('resultBox');
            box.classList.remove('hidden', 'result-pop');
            void box.offsetWidth;
            box.classList.add('result-pop');
            document.getElementById('resultText').textContent = `${manager} drafts ${player.name}!`;
            document.getElementById('resultSub').textContent = `${POS_LABELS[currentPos]} · ${player.rating} OVR · ${player.club}`;
        }

        /* ====== TEAM CARDS ====== */
        function renderTeamCards() {
            const c = document.getElementById('teamCards');
            c.innerHTML = managers.map(m => {
                const team = state.teams[m];
                const startingRows = STARTING_POSITIONS.map(pos => {
                    const pl = (team[pos] || [])[0];
                    return `<div class="flex justify-between items-center py-1.5 px-3 rounded-lg ${pl ? 'bg-surface' : ''}">
                    <span class="text-[10px] font-bold tracking-wider ${pl ? 'text-neon' : 'text-gray-700'}">${POS_LABELS[pos]}</span>
                    ${pl ? `<div class="flex items-center gap-1.5"><span class="text-xs text-gray-200">${pl.name} <span class="text-gray-500">(${pl.rating})</span></span><button onclick="openEditPlayer('${m}','${pos}')" class="text-gray-600 hover:text-neon text-[11px] transition-colors" title="Edit player">✏️</button></div>` : '<span class="text-xs text-gray-700">—</span>'}
                </div>`;
                }).join('');
                const subRows = SUB_POSITIONS.map(pos => {
                    const pl = (team[pos] || [])[0];
                    return `<div class="flex justify-between items-center py-1.5 px-3 rounded-lg ${pl ? 'bg-surface' : ''}">
                    <span class="text-[10px] font-bold tracking-wider ${pl ? 'text-amber-400' : 'text-gray-700'}">${POS_LABELS[pos]}</span>
                    ${pl ? `<div class="flex items-center gap-1.5"><span class="text-xs text-gray-200">${pl.name} <span class="text-gray-500">(${pl.rating})</span></span><button onclick="openEditPlayer('${m}','${pos}')" class="text-gray-600 hover:text-amber-400 text-[11px] transition-colors" title="Edit player">✏️</button></div>` : '<span class="text-xs text-gray-700">—</span>'}
                </div>`;
                }).join('');
                const count = getManagerSquadCount(m);
                return `<div class="manager-card bg-surface-raised rounded-xl border border-gray-800 overflow-hidden">
                <div class="p-4 border-b border-gray-800 flex justify-between items-center">
                    <span class="font-display font-bold tracking-wider text-gray-200">${m}</span>
                    <span class="text-xs px-2 py-0.5 rounded-full ${count === TOTAL_PER_MANAGER ? 'bg-neon/20 text-neon' : 'bg-gray-800 text-gray-500'}">${count}/${TOTAL_PER_MANAGER}</span>
                </div>
                <div class="p-2 space-y-0.5">${startingRows}</div>
                <div class="mx-2 my-1 h-px bg-gradient-to-r from-transparent via-gray-700 to-transparent"></div>
                <div class="px-2 pt-0.5 pb-1"><span class="text-[9px] font-bold tracking-[2px] text-gray-600 uppercase">Subs</span></div>
                <div class="p-2 pt-0 space-y-0.5">${subRows}</div>
            </div>`;
            }).join('');
        }

        /* ====== EDIT PLAYER IN SQUAD ====== */
        let editCtx = null; // { manager, position }

        function openEditPlayer(manager, position) {
            const team = state.teams[manager];
            const pl = (team[position] || [])[0];
            if (!pl) return;

            editCtx = { manager, position };
            document.getElementById('editPlayerPos').textContent = `${manager} — ${POS_LABELS[position]}`;
            document.getElementById('editPlayerName').value = pl.name;
            document.getElementById('editPlayerRating').value = pl.rating;
            document.getElementById('editPlayerClub').value = pl.club;

            const modal = document.getElementById('editPlayerModal');
            modal.classList.remove('hidden');
            modal.classList.add('flex');
            document.getElementById('editPlayerName').focus();
        }

        function closeEditPlayer() {
            const modal = document.getElementById('editPlayerModal');
            modal.classList.add('hidden');
            modal.classList.remove('flex');
            editCtx = null;
        }

        function saveEditPlayer() {
            if (!editCtx) return;
            const name = document.getElementById('editPlayerName').value.trim();
            const rating = Math.min(99, Math.max(1, parseInt(document.getElementById('editPlayerRating').value) || 80));
            const club = document.getElementById('editPlayerClub').value.trim();
            if (!name) { alert('Player name cannot be empty!'); return; }

            state.teams[editCtx.manager][editCtx.position][0] = { name, rating, club };
            saveState();
            closeEditPlayer();
            renderTeamCards();
        }

        function removeEditPlayer() {
            if (!editCtx) return;
            if (!confirm(`Remove this player from ${editCtx.manager}'s squad?`)) return;
            state.teams[editCtx.manager][editCtx.position] = [];
            saveState();
            closeEditPlayer();
            renderAll();
        }

        /* ====== HISTORY ====== */
        function renderHistory() {
            const list = document.getElementById('historyList');
            const empty = document.getElementById('historyEmpty');
            if (state.history.length === 0) { list.innerHTML = ''; empty.classList.remove('hidden'); return; }
            empty.classList.add('hidden');
            list.innerHTML = [...state.history].reverse().map((h, i) =>
                `<div class="history-entry flex items-center gap-3 p-3 rounded-lg bg-surface border border-gray-800/50" style="animation-delay:${Math.min(i, 10) * 50}ms">
                <span class="text-xs font-bold px-2 py-1 rounded bg-surface-raised text-gray-400 tracking-wider">${POS_LABELS[h.position] || h.position}</span>
                <span class="flex-1 text-sm"><span class="text-neon font-semibold">${h.manager}</span> drafted <span class="text-gray-200 font-medium">${h.player}</span> <span class="text-gray-500">(${h.rating})</span></span>
            </div>`
            ).join('');
        }

        /* ====== COPY RESULTS ====== */
        function copyResults() {
            if (state.history.length === 0) { alert('No draft results to copy yet!'); return; }
            let txt = '🎰 FC26 ROULETTE DRAFT RESULTS (4-3-3 + 5 Subs) 🎰\n══════════════════════════════════════\n\n';
            managers.forEach(m => {
                const team = state.teams[m];
                const count = getManagerSquadCount(m);
                txt += `🎮 ${m} (${count}/${TOTAL_PER_MANAGER})\n`;
                txt += '  ── Starting XI ──\n';
                STARTING_POSITIONS.forEach(pos => {
                    const label = POS_LABELS[pos];
                    const pl = (team[pos] || [])[0];
                    txt += pl ? `  ${label}: ${pl.name} (${pl.rating}) - ${pl.club}\n` : `  ${label}: —\n`;
                });
                txt += '  ── Substitutes ──\n';
                SUB_POSITIONS.forEach(pos => {
                    const label = POS_LABELS[pos];
                    const pl = (team[pos] || [])[0];
                    txt += pl ? `  ${label}: ${pl.name} (${pl.rating}) - ${pl.club}\n` : `  ${label}: —\n`;
                });
                txt += '\n';
            });
            navigator.clipboard.writeText(txt).then(() => {
                const btn = event.target.closest('button');
                const orig = btn.textContent;
                btn.textContent = '✅ Copied!';
                setTimeout(() => btn.textContent = orig, 2000);
            });
        }

        /* ====== RESET ====== */
        function resetDraft() {
            if (!confirm('⚠️ Reset the entire draft? This will clear all picks and history.')) return;
            localStorage.removeItem('fc26draft');
            state = freshState();
            document.getElementById('resultBox').classList.add('hidden');
            currentPos = 'GK';
            document.querySelectorAll('.pos-tab').forEach(t => t.classList.toggle('active', t.dataset.pos === 'GK'));
            renderAll();
        }

        /* ====== ROSTER EDITOR ====== */
        function openRosterModal() {
            if (state.history.length > 0 && !confirm('Editing the roster will reset the current draft. Continue?')) return;
            tempRoster = JSON.parse(JSON.stringify(fc26Roster));
            modalPos = 'GK';
            const modal = document.getElementById('rosterModal');
            modal.classList.remove('hidden');
            modal.classList.add('flex');
            renderModalTabs();
            renderModalBody();
        }

        function closeRosterModal() {
            const modal = document.getElementById('rosterModal');
            modal.classList.add('hidden');
            modal.classList.remove('flex');
            tempRoster = null;
        }

        function saveAndCloseRoster() {
            readModalInputs();
            fc26Roster = JSON.parse(JSON.stringify(tempRoster));
            localStorage.removeItem('fc26draft');
            state = freshState();
            closeRosterModal();
            currentPos = 'GK';
            document.querySelectorAll('.pos-tab').forEach(t => t.classList.toggle('active', t.dataset.pos === 'GK'));
            renderAll();
        }

        function renderModalTabs() {
            document.getElementById('modalPosTabs').innerHTML = POSITIONS.map(p => {
                const count = (tempRoster[p] || []).length;
                const need = FORMATION[p] * managers.length;
                return `<button onclick="switchModalPos('${p}')" class="px-4 py-2 rounded-lg text-sm font-semibold transition-all ${p === modalPos ? 'bg-neon text-surface-deep' : 'bg-surface border border-gray-700 text-gray-400 hover:text-white'}">${p} <span class="opacity-60">(${count}/${need})</span></button>`;
            }).join('');
        }

        function switchModalPos(p) {
            readModalInputs();
            modalPos = p;
            renderModalTabs();
            renderModalBody();
        }

        function renderModalBody() {
            const players = tempRoster[modalPos] || [];
            const need = FORMATION[modalPos] * managers.length;
            const countInfo = `<div class="mb-4 text-xs text-gray-500 text-center">${players.length} players · Need exactly ${need} for ${managers.length} managers × ${FORMATION[modalPos]} ${modalPos} each</div>`;
            document.getElementById('modalBody').innerHTML = countInfo + (players.length === 0
                ? '<p class="text-gray-600 text-center py-8">No players. Click "+ Add Player" below.</p>'
                : players.map((p, i) => `
                <div class="flex gap-3 items-center mb-3 p-3 rounded-lg bg-surface border border-gray-800" data-idx="${i}">
                    <div class="flex-1 space-y-2">
                        <input type="text" value="${p.name}" data-field="name" placeholder="Player Name" class="w-full bg-surface-raised border border-gray-700 rounded-lg px-3 py-2 text-sm text-gray-200 focus:border-neon focus:outline-none">
                        <div class="flex gap-2">
                            <input type="number" value="${p.rating}" data-field="rating" min="1" max="99" class="w-20 bg-surface-raised border border-gray-700 rounded-lg px-3 py-2 text-sm text-gray-200 focus:border-neon focus:outline-none">
                            <input type="text" value="${p.club}" data-field="club" placeholder="Club" class="flex-1 bg-surface-raised border border-gray-700 rounded-lg px-3 py-2 text-sm text-gray-200 focus:border-neon focus:outline-none">
                        </div>
                    </div>
                    <button onclick="removePlayer(${i})" class="text-gray-600 hover:text-danger text-xl px-2">✕</button>
                </div>
            `).join(''));
        }

        function readModalInputs() {
            if (!tempRoster) return;
            const rows = document.querySelectorAll('#modalBody [data-idx]');
            const updated = [];
            rows.forEach(row => {
                const name = row.querySelector('[data-field=name]').value.trim();
                const rating = parseInt(row.querySelector('[data-field=rating]').value) || 80;
                const club = row.querySelector('[data-field=club]').value.trim();
                if (name) updated.push({ name, rating: Math.min(99, Math.max(1, rating)), club });
            });
            tempRoster[modalPos] = updated;
        }

        function addPlayerToRoster() {
            readModalInputs();
            tempRoster[modalPos].push({ name: "", rating: 80, club: "" });
            renderModalBody();
            const body = document.getElementById('modalBody');
            body.scrollTop = body.scrollHeight;
        }

        function removePlayer(idx) {
            readModalInputs();
            tempRoster[modalPos].splice(idx, 1);
            renderModalBody();
        }

        /* ====== START ====== */
        init();
    </script>
</body>

</html>
